
# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: build

on:
  push:
    branches: [ master, future ]
  workflow_dispatch:   # allow manual trigger from any branch

jobs:
  # Run tests on different versions of python
  unittest:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-13]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Test with pytest
      env:
        MPLBACKEND: TkAgg
      run: |
        pytest --capture=no --ignore=W605 --timeout=50 --timeout_method=thread

  codecov:
    # If all tests pass:
    # Run coverage and upload to codecov
    needs: unittest
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Run coverage
      run: |
        pip install .[dev]
        coverage run --omit='tests/*.py' -m pytest
        coverage report
        coverage xml 
    - name: upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml

  sphinx:
    # If the above worked:
    # Build docs and upload to GH Pages
    needs: unittest
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev,docs]
        pip install git+https://github.com/petercorke/sphinx-autorun.git
        pip install sympy
        sudo apt-get install graphviz
    - name: Build docs
      run: |
        cd docs
        make html
        # Tell GitHub not to use jekyll to compile the docs
        touch build/html/.nojekyll
        cd ../

    - name: Build wheel for JupyterLite
      run: |
        pip install build
        python -m build --wheel --outdir docs/lite/pypi

    - name: Sync notebooks into JupyterLite content
      run: |
        mkdir -p docs/lite/files
        cp examples/bouncing-ball.ipynb docs/lite/files/

    - name: Adapt notebooks for JupyterLite/Pyodide
      run: |
        python - <<'PY'
        import json
        from pathlib import Path

        root = Path("docs/lite/files")
        install_src = [
            "import micropip\n",
            "await micropip.install('bdsim')\n",
        ]

        for nb_path in root.rglob("*.ipynb"):
            with nb_path.open("r", encoding="utf-8") as f:
                nb = json.load(f)

            # Set Pyodide kernelspec
            meta = nb.setdefault("metadata", {})
            meta["kernelspec"] = {
                "name": "python",
                "display_name": "Python (Pyodide)",
                "language": "python",
            }
            meta.setdefault("language_info", {})["name"] = "python"

            # Prepend micropip install cell if not already present
            first_code = next(
                (c for c in nb["cells"] if c.get("cell_type") == "code"), None
            )
            if first_code is None or "micropip" not in "".join(
                first_code.get("source", []) if isinstance(first_code["source"], list)
                else [first_code["source"]]
            ):
                nb["cells"].insert(0, {
                    "cell_type": "code",
                    "id": "lite-install",
                    "source": [
                        "# Install bdsim in the browser-based Pyodide environment.\n",
                        "# In a regular Jupyter server this is a no-op (micropip is not available).\n",
                        "try:\n",
                        "    import micropip\n",
                        "    await micropip.install('bdsim')\n",
                        "except ImportError:\n",
                        "    pass  # already installed (classic Jupyter)\n",
                    ],
                    "metadata": {},
                    "outputs": [],
                    "execution_count": None,
                })

            # Drop shell-magic lines (! commands) — not available in Pyodide
            for cell in nb["cells"]:
                if cell.get("cell_type") != "code":
                    continue
                src = cell.get("source", [])
                lines = src.splitlines(keepends=True) if isinstance(src, str) else src
                filtered = [l for l in lines if not l.strip().startswith("!")]
                cell["source"] = filtered if isinstance(src, list) else "".join(filtered)

            with nb_path.open("w", encoding="utf-8") as f:
                json.dump(nb, f, indent=1)
                f.write("\n")
        PY

    - name: Build JupyterLite site
      run: |
        pip install jupyterlite-core jupyterlite-pyodide-kernel
        cd docs/lite && jupyter lite build --output-dir ../build/html/lite

    - name: Upload docs artifact (all branches)
      uses: actions/upload-artifact@v4
      with:
        name: bdsim-docs
        path: docs/build/html
        retention-days: 14

    - name: Commit documentation changes
      if: github.ref == 'refs/heads/master'
      run: |
        git clone https://github.com/petercorke/bdsim.git --branch gh-pages --single-branch gh-pages
        cp -r docs/build/html/* gh-pages/
        cd gh-pages
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Update documentation" -a || true
        # The above command will fail if no changes were present, so we ignore
        # that.
    - name: Push changes
      if: github.ref == 'refs/heads/master'
      uses: ad-m/github-push-action@master
      with:
        branch: gh-pages
        directory: gh-pages
        github_token: ${{ secrets.GITHUB_TOKEN }}
